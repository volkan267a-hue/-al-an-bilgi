const Download = (p) => <Icon {...p}><path d="M12 3v12"/><polyline points="7 10 12 15 17 10"/><path d="M5 19h14"/></Icon>;
const UploadCloud = (p) => <Icon {...p}><path d="M7 17a4 4 0 0 1 0-8 5 5 0 0 1 9.6-1.5A4.5 4.5 0 0 1 17 17"/><polyline points="9 13 12 10 15 13"/><line x1="12" y1="10" x2="12" y2="19"/></Icon>;
const FileSpreadsheet = (p) => <Icon {...p}><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8Z"/><polyline points="14 3 14 8 19 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/><line x1="11" y1="13" x2="11" y2="21"/></Icon>;

const Eye = (p) => <Icon {...p}><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/></Icon>;
const EyeOff = (p) => <Icon {...p}><path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a18.6 18.6 0 0 1 4.22-5.06M9.9 4.24A10.4 10.4 0 0 1 12 4c7 0 11 7 11 7a18.6 18.6 0 0 1-2.16 3.19"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></Icon>;
const Pencil = (p) => <Icon {...p}><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="M15 5l4 4"/></Icon>;
const Save = (p) => <Icon {...p}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8"/><path d="M7 3v5h8"/></Icon>;

// ---------------------------------------------------------------------------
// Varsayılan Veriler
// ---------------------------------------------------------------------------
const ADMIN_PASSWORD = 'admin123';
const DEFAULT_EMPLOYEE_PASSWORD = '1234';

  { id: 1, ad: 'Ahmet', soyad: 'Yılmaz', email: 'ahmet.yilmaz@sirket.com', departman: 'Yazılım', kalanIzin: 14, saatBakiye: 3.5, sifre: DEFAULT_EMPLOYEE_PASSWORD },

  { id: 3, ad: 'Mehmet', soyad: 'Demir', email: 'mehmet.demir@sirket.com', departman: 'Yazılım', kalanIzin: 20, saatBakiye: 0, sifre: DEFAULT_EMPLOYEE_PASSWORD },
  { id: 4, ad: 'Zeynep', soyad: 'Şahin', email: 'zeynep.sahin@sirket.com', departman: 'İK', kalanIzin: 12, saatBakiye: 5, sifre: DEFAULT_EMPLOYEE_PASSWORD },
  { id: 5, ad: 'Can', soyad: 'Öztürk', email: 'can.ozturk@sirket.com', departman: 'Satış', kalanIzin: 18, saatBakiye: -1.5, sifre: DEFAULT_EMPLOYEE_PASSWORD },
  { id: 6, ad: 'Ayşe', soyad: 'Çelik', email: 'ayse.celik@sirket.com', departman: 'Pazarlama', kalanIzin: 7, saatBakiye: 2, sifre: DEFAULT_EMPLOYEE_PASSWORD },

const initialAnnouncements = [
  { id: 1, baslik: 'Yaz Tatili Çalışma Saatleri', icerik: 'Temmuz-Ağustos döneminde ofis çalışma saatlerimiz 09:00-17:00 olarak güncellenmiştir. İyi tatiller!', tarih: '2026-07-10' },
  { id: 2, baslik: 'Yeni İK Politikası Yayınlandı', icerik: 'Uzaktan çalışma ve esnek mesai ile ilgili güncellenmiş politikaya intranet üzerinden ulaşabilirsiniz.', tarih: '2026-07-05' },
];

const parseDate = (str) => new Date(`${str}T00:00:00`);
const formatDate = (str) => parseDate(str).toLocaleDateString('tr-TR', { day: '2-digit', month: 'short', year: 'numeric' });
const DEPT_COLORS = ['bg-indigo-500', 'bg-teal-500', 'bg-amber-500', 'bg-rose-500', 'bg-violet-500', 'bg-cyan-500'];
const ACCENT = {
  indigo: 'bg-indigo-50 text-indigo-600',
  emerald: 'bg-emerald-50 text-emerald-600',
  rose: 'bg-rose-50 text-rose-600',
  amber: 'bg-amber-50 text-amber-600',
  violet: 'bg-violet-50 text-violet-600',
};

function StatCard({ icon: IconComp, label, value, accent }) {
  return (
    <div className="bg-white rounded-2xl shadow-sm ring-1 ring-slate-200 p-5">
      <div className={`w-10 h-10 rounded-xl flex items-center justify-center mb-3 ${ACCENT[accent]}`}>
        <IconComp className="w-5 h-5" />
      </div>
      <p className="text-2xl font-bold text-slate-900">{value}</p>
      <p className="text-xs text-slate-500 mt-1">{label}</p>
    </div>
  );
}

function PasswordField({ value, onChange, placeholder, onEnter }) {
  const [visible, setVisible] = useState(false);
  return (
    <div className="relative">
      <Lock className="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2" />
      <input
        type={visible ? 'text' : 'password'}
        value={value}
        onChange={(e) => onChange(e.target.value)}
        onKeyDown={(e) => { if (e.key === 'Enter' && onEnter) onEnter(); }}
        placeholder={placeholder}
        className="w-full border border-slate-300 rounded-lg pl-9 pr-9 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
      />
      <button type="button" onClick={() => setVisible((v) => !v)} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
        {visible ? <EyeOff className="w-4 h-4" /> : <Eye className="w-4 h-4" />}
      </button>
    </div>
  );
}

function LoginScreen({ employees, onAdminLogin, onEmployeeLogin }) {
  const [adminPassword, setAdminPassword] = useState('');
  const [adminError, setAdminError] = useState('');
  const [selectedEmp, setSelectedEmp] = useState('');
  const [empPassword, setEmpPassword] = useState('');
  const [empError, setEmpError] = useState('');

  const submitAdmin = () => {
    if (adminPassword === ADMIN_PASSWORD) {
      setAdminError('');
      onAdminLogin();
    } else {
      setAdminError('Şifre hatalı. Lütfen tekrar deneyin.');
    }
  };

  const submitEmployee = () => {
    if (!selectedEmp) { setEmpError('Lütfen bir çalışan seçin.'); return; }
    const emp = employees.find((e) => e.id === Number(selectedEmp));
    if (emp && empPassword === emp.sifre) {
      setEmpError('');
      onEmployeeLogin(emp.id);
    } else {
      setEmpError('Şifre hatalı. Lütfen tekrar deneyin.');
    }
  };

  return (
    <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
      <div className="w-full max-w-4xl">
        <div className="text-center mb-10">
          <div className="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-indigo-600 mb-4">
            <Building2 className="w-7 h-7 text-white" />
          </div>
          <h1 className="text-2xl sm:text-3xl font-bold text-white">Çalışan Bilgilendirme ve Takip Portalı</h1>
          <p className="text-slate-400 mt-2 text-sm">Devam etmek için giriş türünüzü seçin ve şifrenizi girin</p>
        </div>
        <div className="grid md:grid-cols-2 gap-6">
          <div className="bg-white rounded-2xl p-8 shadow-xl shadow-black/20">
            <div className="w-12 h-12 rounded-xl bg-indigo-50 flex items-center justify-center mb-4">
              <LayoutDashboard className="w-6 h-6 text-indigo-600" />
            </div>
            <h2 className="text-lg font-bold text-slate-900 mb-1">Yönetici Girişi</h2>
            <p className="text-sm text-slate-500 mb-4">Çalışanları ve duyuruları yönetin.</p>
            <div className="mb-1">
              <PasswordField value={adminPassword} onChange={setAdminPassword} placeholder="Yönetici şifresi" onEnter={submitAdmin} />
            </div>
            {adminError && <p className="text-xs text-rose-600 font-medium mb-2">{adminError}</p>}
            <button onClick={submitAdmin} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition-colors mt-4">Yönetici Olarak Gir</button>
          </div>
          <div className="bg-white rounded-2xl p-8 shadow-xl shadow-black/20">
            <div className="w-12 h-12 rounded-xl bg-teal-50 flex items-center justify-center mb-4">
              <Users className="w-6 h-6 text-teal-600" />
            </div>
            <h2 className="text-lg font-bold text-slate-900 mb-1">Çalışan Girişi</h2>
            <p className="text-sm text-slate-500 mb-4">Bilgilerinizi görüntüleyin, duyuruları takip edin.</p>
            <select value={selectedEmp} onChange={(e) => setSelectedEmp(e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm mb-3 focus:outline-none focus:ring-2 focus:ring-teal-500">
              <option value="">Çalışan seçin...</option>
              {employees.map((emp) => (
                <option key={emp.id} value={emp.id}>{emp.ad} {emp.soyad} — {emp.departman}</option>
              ))}
            </select>
            <div className="mb-1">
              <PasswordField value={empPassword} onChange={setEmpPassword} placeholder="Çalışan şifresi" onEnter={submitEmployee} />
            </div>
            {empError && <p className="text-xs text-rose-600 font-medium mb-2">{empError}</p>}
            <button onClick={submitEmployee} className="w-full bg-teal-600 hover:bg-teal-700 text-white font-semibold py-2.5 rounded-lg transition-colors mt-4">Çalışan Olarak Gir</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function Header({ currentUser, employeeData, onLogout, theme, onSave, isDirty, savedFlash }) {
  return (
    <header className={theme === 'admin' ? 'bg-slate-900' : 'bg-white border-b border-slate-200'}>
      <div className="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
        <div className="flex items-center gap-3 min-w-0">
          <div className={`w-9 h-9 rounded-lg flex items-center justify-center shrink-0 ${theme === 'admin' ? 'bg-indigo-600' : 'bg-teal-600'}`}>
            <Building2 className="w-5 h-5 text-white" />
          </div>
          <div className="min-w-0">
            <p className={`text-sm font-bold truncate ${theme === 'admin' ? 'text-white' : 'text-slate-900'}`}>Çalışan Portalı</p>
            <p className={`text-xs truncate ${theme === 'admin' ? 'text-slate-400' : 'text-slate-500'}`}>
              {currentUser.role === 'admin' ? 'Yönetici Paneli' : `${employeeData.ad} ${employeeData.soyad} · ${employeeData.departman}`}
            </p>
          </div>
        </div>
        <div className="flex items-center gap-2 shrink-0">
          {theme === 'admin' && (
            <button
              onClick={onSave}
              className={`flex items-center gap-1.5 text-sm font-medium px-3 py-2 rounded-lg transition-colors ${
                savedFlash ? 'bg-emerald-600 text-white' : isDirty ? 'bg-indigo-600 hover:bg-indigo-700 text-white' : 'bg-slate-800 text-slate-400'
              }`}
            >
              {savedFlash ? <CheckCircle2 className="w-4 h-4" /> : <Save className="w-4 h-4" />}
              <span className="hidden sm:inline">{savedFlash ? 'Buluta Kaydedildi' : isDirty ? 'Değişiklikleri Buluta Kaydet' : 'Bulutla Senkronize'}</span>
              {isDirty && !savedFlash && <span className="w-1.5 h-1.5 rounded-full bg-amber-400 sm:hidden" />}
            </button>
          )}
          <button onClick={onLogout} className={`flex items-center gap-1.5 text-sm font-medium px-3 py-2 rounded-lg transition-colors ${theme === 'admin' ? 'text-slate-300 hover:bg-slate-800' : 'text-slate-600 hover:bg-slate-100'}`}>
            <LogOut className="w-4 h-4" /><span className="hidden sm:inline">Çıkış</span>
          </button>
        </div>
      </div>
    </header>
  );
}

function AdminDashboard({ employees }) {
  const totalBalance = employees.reduce((s, e) => s + e.saatBakiye, 0);
  const deptCounts = employees.reduce((acc, e) => { acc[e.departman] = (acc[e.departman] || 0) + 1; return acc; }, {});
  const maxDept = Math.max(...Object.values(deptCounts), 1);
  const negativeBalance = employees.filter((e) => e.saatBakiye < 0).sort((a, b) => a.saatBakiye - b.saatBakiye);

  return (
    <div className="space-y-6">
      <div className="grid sm:grid-cols-2 gap-4">
        <StatCard icon={Users} label="Toplam Çalışan" value={employees.length} accent="indigo" />
        <StatCard icon={totalBalance >= 0 ? TrendingUp : TrendingDown} label="Şirket Geneli Saat Bakiyesi" value={`${totalBalance >= 0 ? '+' : ''}${totalBalance.toFixed(1)} sa`} accent={totalBalance >= 0 ? 'emerald' : 'rose'} />
      </div>
      <div className="grid lg:grid-cols-2 gap-4">
        <div className="bg-white rounded-2xl shadow-sm ring-1 ring-slate-200 p-6">
          <h3 className="text-sm font-bold text-slate-900 mb-4">Departmanlara Göre Dağılım</h3>
          <div className="space-y-3">
            {Object.entries(deptCounts).map(([dept, count], i) => (
              <div key={dept}>
                <div className="flex justify-between text-xs mb-1">
                  <span className="font-medium text-slate-700">{dept}</span>
                  <span className="text-slate-500">{count} kişi</span>
                </div>
                <div className="w-full h-2.5 bg-slate-100 rounded-full overflow-hidden">
                  <div className={`h-full rounded-full ${DEPT_COLORS[i % DEPT_COLORS.length]}`} style={{ width: `${(count / maxDept) * 100}%` }} />
                </div>
              </div>
            ))}
          </div>
        </div>
        <div className="bg-white rounded-2xl shadow-sm ring-1 ring-slate-200 p-6">
          <h3 className="text-sm font-bold text-slate-900 mb-4">Saat Bakiyesi Negatif Olan Çalışanlar</h3>
          {negativeBalance.length === 0 ? (
            <p className="text-sm text-slate-400 py-8 text-center">Saat bakiyesi negatif olan çalışan bulunmuyor.</p>
          ) : (
            <ul className="space-y-3">
              {negativeBalance.map((e) => (
                <li key={e.id} className="flex items-center justify-between gap-3 text-sm">
                  <div className="flex items-center gap-3 min-w-0">
                    <div className="w-8 h-8 rounded-full bg-rose-100 text-rose-700 flex items-center justify-center text-xs font-bold shrink-0">{e.ad[0]}{e.soyad[0]}</div>
                    <div className="min-w-0">
                      <p className="font-medium text-slate-800 truncate">{e.ad} {e.soyad}</p>
                      <p className="text-xs text-slate-500">{e.departman}</p>
                    </div>
                  </div>
                  <span className="text-rose-600 font-semibold text-xs whitespace-nowrap shrink-0">{e.saatBakiye} sa</span>
                </li>
              ))}
            </ul>
          )}
        </div>
      </div>
    </div>
  );
}

function Modal({ title, onClose, children }) {
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/50" onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-xl w-full max-w-lg max-h-[90vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between px-6 py-4 border-b border-slate-100 sticky top-0 bg-white">
          <h3 className="text-sm font-bold text-slate-900">{title}</h3>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-600 transition-colors"><XCircle className="w-5 h-5" /></button>
        </div>
        <div className="p-6">{children}</div>
      </div>
    </div>
  );
}

function EmployeeEditForm({ employee, onSave, onCancel }) {
  const [form, setForm] = useState({ ad: employee.ad, soyad: employee.soyad, email: employee.email, departman: employee.departman, kalanIzin: employee.kalanIzin, saatBakiye: employee.saatBakiye });
  const [error, setError] = useState('');
  const set = (key) => (e) => setForm((f) => ({ ...f, [key]: e.target.value }));

  const submit = () => {
    if (!form.ad.toString().trim() || !form.soyad.toString().trim() || !form.email.toString().trim()) {
      setError('Ad, soyad ve email alanları zorunludur.');
      return;
    }
    setError('');
    onSave({ ad: form.ad.toString().trim(), soyad: form.soyad.toString().trim(), email: form.email.toString().trim(), departman: form.departman.toString().trim() || 'Belirtilmemiş', kalanIzin: parseFloat(form.kalanIzin) || 0, saatBakiye: parseFloat(form.saatBakiye) || 0 });
  };

  return (
    <div className="space-y-4">
      <div className="grid sm:grid-cols-2 gap-4">
        <div><label className="text-xs font-medium text-slate-600 block mb-1">Ad</label><input value={form.ad} onChange={set('ad')} className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" /></div>
        <div><label className="text-xs font-medium text-slate-600 block mb-1">Soyad</label><input value={form.soyad} onChange={set('soyad')} className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" /></div>
      </div>
      <div><label className="text-xs font-medium text-slate-600 block mb-1">Email</label><input type="email" value={form.email} onChange={set('email')} className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" /></div>
      <div><label className="text-xs font-medium text-slate-600 block mb-1">Departman</label><input value={form.departman} onChange={set('departman')} className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" /></div>
      <div className="grid sm:grid-cols-2 gap-4">
        <div><label className="text-xs font-medium text-slate-600 block mb-1">Kalan İzin (gün)</label><input type="number" step="1" value={form.kalanIzin} onChange={set('kalanIzin')} className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" /></div>
        <div><label className="text-xs font-medium text-slate-600 block mb-1">Saat Bakiyesi</label><input type="number" step="0.5" value={form.saatBakiye} onChange={set('saatBakiye')} className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" /></div>

        <button onClick={onCancel} className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-semibold py-2.5 rounded-lg transition-colors">Vazgeç</button>

function EmployeePasswordCell({ emp, onUpdatePassword }) {
  const [editing, setEditing] = useState(false);
  const [value, setValue] = useState(emp.sifre);
  const [visible, setVisible] = useState(false);
  const [savedFlash, setSavedFlash] = useState(false);

  const save = () => {
    const trimmed = value.trim();
    if (trimmed) {
      onUpdatePassword(emp.id, trimmed);
      setSavedFlash(true);
      setTimeout(() => setSavedFlash(false), 1500);
    }
    setEditing(false);
  };

  if (!editing) {
    return (
      <div className="flex items-center justify-end gap-2">
        {savedFlash && <span className="text-[10px] font-semibold text-emerald-600">Kaydedildi</span>}
        <span className="font-mono text-xs text-slate-400 tracking-widest">{'•'.repeat(Math.min(Math.max(emp.sifre.length, 4), 8))}</span>
        <button onClick={() => { setValue(emp.sifre); setVisible(false); setEditing(true); }} className="text-xs font-semibold text-indigo-600 hover:text-indigo-700 whitespace-nowrap">Şifreyi Belirle</button>
      </div>
    );
  }

  return (
    <div className="flex items-center justify-end gap-1.5">
      <div className="relative">
        <input type={visible ? 'text' : 'password'} value={value} onChange={(e) => setValue(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') save(); if (e.key === 'Escape') setEditing(false); }} className="w-28 border border-slate-300 rounded-md pl-2 pr-7 py-1 text-xs font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500" autoFocus />
        <button type="button" onClick={() => setVisible((v) => !v)} className="absolute right-1.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
          {visible ? <EyeOff className="w-3.5 h-3.5" /> : <Eye className="w-3.5 h-3.5" />}
        </button>
      </div>
      <button onClick={save} title="Kaydet" className="text-emerald-600 hover:text-emerald-700"><CheckCircle2 className="w-4 h-4" /></button>
      <button onClick={() => setEditing(false)} title="Vazgeç" className="text-rose-500 hover:text-rose-600"><XCircle className="w-4 h-4" /></button>
    </div>
  );
}

const TEMPLATE_HEADERS = ['Ad', 'Soyad', 'Email', 'Departman', 'Kalan_Izin', 'Calisma_Saati_Bakiye', 'Sifre'];
const TEMPLATE_SAMPLE_ROW = ['Ahmet', 'Yılmaz', 'ahmet.yilmaz@sirket.com', 'Yazılım', 14, 3.5, 'Ahmet2026!'];

function AdminEmployees({ employees, onUpload, onUpdatePassword, onUpdateEmployee, onDeleteEmployee }) {
  const [uploadMode, setUploadMode] = useState('append');
  const [uploadStatus, setUploadStatus] = useState(null);
  const [editingEmployee, setEditingEmployee] = useState(null);
  const [deletingEmployee, setDeletingEmployee] = useState(null);
  const fileInputRef = useRef(null);

  const processRows = (rawRows) => {
    const parsed = rawRows.map((r) => {
      const norm = {};
      Object.keys(r).forEach((k) => { norm[k.toString().trim().toLowerCase().replace(/\s+/g, '_')] = r[k]; });
      return {
        ad: (norm['ad'] ?? '').toString().trim(),
        soyad: (norm['soyad'] ?? '').toString().trim(),
        email: (norm['email'] ?? '').toString().trim(),
        departman: (norm['departman'] ?? '').toString().trim() || 'Belirtilmemiş',
        kalanIzin: parseFloat(norm['kalan_izin']) || 0,
        saatBakiye: parseFloat(norm['calisma_saati_bakiye']) || 0,
        sifre: (norm['sifre'] ?? norm['şifre'] ?? '').toString().trim(),
      };
    }).filter((p) => p.email);

    if (parsed.length === 0) {
      setUploadStatus({ type: 'error', msg: 'Dosyada geçerli kayıt bulunamadı.' });
    } else {
      onUpload(parsed, uploadMode);
      setUploadStatus({ type: 'success', msg: `${parsed.length} kayıt eklendi/güncellendi.` });
    }
  };

  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const ext = file.name.split('.').pop().toLowerCase();

    if (ext === 'xlsx' || ext === 'xls') {
      const reader = new FileReader();
      reader.onload = (evt) => {
        try {
          const data = new Uint8Array(evt.target.result);
          const workbook = XLSX.read(data, { type: 'array' });
          const rawRows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: '' });
          processRows(rawRows);
        } catch (err) { setUploadStatus({ type: 'error', msg: 'Excel okunurken hata oluştu.' }); }
        if (fileInputRef.current) fileInputRef.current.value = '';
      };
      reader.readAsArrayBuffer(file);
    } else {
      const reader = new FileReader();
      reader.onload = (evt) => {
        try {
          const lines = String(evt.target.result).trim().split(/\r?\n/);
          const headers = lines[0].split(',').map((h) => h.trim());
          const rawRows = lines.slice(1).filter((l) => l.trim()).map((line) => {
            const values = line.split(',').map((v) => v.trim());
            const obj = {};
            headers.forEach((h, i) => { obj[h] = values[i]; });
            return obj;
          });
          processRows(rawRows);
        } catch (err) { setUploadStatus({ type: 'error', msg: 'CSV okunurken hata oluştu.' }); }
        if (fileInputRef.current) fileInputRef.current.value = '';
      };
      reader.readAsText(file, 'UTF-8');
    }
  };

  return (
    <div className="space-y-6">
      <div className="bg-white rounded-2xl shadow-sm ring-1 ring-slate-200 p-6">
        <div className="flex items-start justify-between flex-wrap gap-4 mb-4">
          <div>
            <h3 className="text-sm font-bold text-slate-900 flex items-center gap-2"><FileSpreadsheet className="w-4 h-4 text-indigo-600" />Excel / CSV ile Toplu Yükleme</h3>
            <p className="text-xs text-slate-500 mt-1">Sütun yapısına uygun bir dosya seçip yükleyin.</p>
          </div>
          <button onClick={() => { const ws = XLSX.utils.aoa_to_sheet([TEMPLATE_HEADERS, TEMPLATE_SAMPLE_ROW]); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Calisanlar'); XLSX.writeFile(wb, 'calisan_sablonu.xlsx'); }} className="flex items-center gap-1.5 text-xs font-semibold text-indigo-600 hover:text-indigo-700 bg-indigo-50 hover:bg-indigo-100 px-3 py-2 rounded-lg transition-colors"><Download className="w-3.5 h-3.5" />Excel Şablonu İndir</button>
        </div>
        <div className="flex flex-wrap items-center gap-4">
          <div className="flex bg-slate-100 rounded-lg p-1 text-xs font-medium">
            <button onClick={() => setUploadMode('append')} className={`px-3 py-1.5 rounded-md transition-colors ${uploadMode === 'append' ? 'bg-white shadow text-indigo-600' : 'text-slate-500'}`}>Listeye Ekle</button>
            <button onClick={() => setUploadMode('overwrite')} className={`px-3 py-1.5 rounded-md transition-colors ${uploadMode === 'overwrite' ? 'bg-white shadow text-indigo-600' : 'text-slate-500'}`}>Üzerine Yaz</button>
          </div>
          <label className="flex items-center gap-2 text-xs font-semibold text-white bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-lg cursor-pointer transition-colors">
            <UploadCloud className="w-4 h-4" /> Dosya Seç ve Yükle
            <input ref={fileInputRef} type="file" accept=".csv,.xlsx,.xls" onChange={handleFile} className="hidden" />
          </label>
        </div>
        {uploadStatus && <p className={`text-xs mt-3 font-medium ${uploadStatus.type === 'success' ? 'text-emerald-600' : 'text-rose-600'}`}>{uploadStatus.msg}</p>}
      </div>

      <div className="bg-white rounded-2xl shadow-sm ring-1 ring-slate-200 overflow-hidden">
        <div className="px-6 py-4 border-b border-slate-100"><h3 className="text-sm font-bold text-slate-900">Çalışan Listesi ({employees.length})</h3></div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-slate-50 text-slate-500 text-xs uppercase tracking-wide">
              <tr>
                <th className="px-6 py-3 text-left font-semibold">Ad Soyad</th>
                <th className="px-6 py-3 text-left font-semibold">Email</th>
                <th className="px-6 py-3 text-left font-semibold">Departman</th>
                <th className="px-6 py-3 text-right font-semibold">Kalan İzin</th>
                <th className="px-6 py-3 text-right font-semibold">Saat Bakiyesi</th>
                <th className="px-6 py-3 text-right font-semibold">Şifre</th>
                <th className="px-6 py-3 text-right font-semibold">İşlemler</th>
              </tr>
            </thead>
            <tbody className="divide-y divide-slate-100">
              {employees.map((emp) => (
                <tr key={emp.id} className="hover:bg-slate-50 transition-colors">
                  <td className="px-6 py-3 font-medium text-slate-800 whitespace-nowrap">{emp.ad} {emp.soyad}</td>
                  <td className="px-6 py-3 text-slate-500 whitespace-nowrap">{emp.email}</td>
                  <td className="px-6 py-3 text-slate-500 whitespace-nowrap">{emp.departman}</td>
                  <td className="px-6 py-3 text-right text-slate-700 whitespace-nowrap">{emp.kalanIzin} gün</td>
                  <td className={`px-6 py-3 text-right font-semibold whitespace-nowrap ${emp.saatBakiye < 0 ? 'text-rose-600' : 'text-emerald-600'}`}>{emp.saatBakiye >= 0 ? '+' : ''}{emp.saatBakiye} sa</td>
                  <td className="px-6 py-3 text-right whitespace-nowrap"><EmployeePasswordCell emp={emp} onUpdatePassword={onUpdatePassword} /></td>
                  <td className="px-6 py-3 text-right whitespace-nowrap">
                    <div className="flex items-center justify-end gap-2">
                      <button onClick={() => setEditingEmployee(emp)} className="flex items-center gap-1 text-xs font-semibold text-indigo-600 hover:text-indigo-700 bg-indigo-50 hover:bg-indigo-100 px-3 py-1.5 rounded-lg transition-colors"><Pencil className="w-3.5 h-3.5" />Düzenle</button>
                      <button onClick={() => setDeletingEmployee(emp)} className="flex items-center gap-1 text-xs font-semibold text-rose-600 hover:text-rose-700 bg-rose-50 hover:bg-rose-100 px-3 py-1.5 rounded-lg transition-colors"><Trash2 className="w-3.5 h-3.5" />Sil</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {editingEmployee && (
        <Modal title={`${editingEmployee.ad} ${editingEmployee.soyad} — Bilgileri Düzenle`} onClose={() => setEditingEmployee(null)}>
          <EmployeeEditForm employee={editingEmployee} onCancel={() => setEditingEmployee(null)} onSave={(updates) => { onUpdateEmployee(editingEmployee.id, updates); setEditingEmployee(null); }} />
        </Modal>
      )}

      {deletingEmployee && (
        <Modal title="Çalışanı Sil" onClose={() => setDeletingEmployee(null)}>
          <div className="space-y-4">
            <p className="text-sm text-slate-600"><span className="font-semibold text-slate-900">{deletingEmployee.ad} {deletingEmployee.soyad}</span> adlı çalışanı silmek üzeresiniz. Bu işlem geri alınamaz.</p>
            <div className="flex gap-2 pt-2">
              <button onClick={() => { onDeleteEmployee(deletingEmployee.id); setDeletingEmployee(null); }} className="flex-1 bg-rose-600 hover:bg-rose-700 text-white text-sm font-semibold py-2.5 rounded-lg transition-colors">Evet, Sil</button>
              <button onClick={() => setDeletingEmployee(null)} className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-semibold py-2.5 rounded-lg transition-colors">Vazgeç</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

const ADMIN_TABS = [
  { key: 'dashboard', label: 'Dashboard', icon: LayoutDashboard },
  { key: 'employees', label: 'Çalışanlar', icon: Users },
  { key: 'announcements', label: 'Duyurular', icon: Megaphone },
];

function App() {
  const [employees, setEmployees] = useState([]);
  const [announcements, setAnnouncements] = useState([]);
  const [loading, setLoading] = useState(true);
  const [currentUser, setCurrentUser] = useState(null);
  const [adminTab, setAdminTab] = useState('dashboard');

  const [isDirty, setIsDirty] = useState(false);
  const [savedFlash, setSavedFlash] = useState(false);
  const isFirstRender = useRef(true);

  // Vercel KV'nin varsayılan /api/blob veya yerel json entegrasyonu için akıllı endpoint yönlendirmesi
  useEffect(() => {
    fetch('/api/storage-getir')
      .then((res) => res.json())
      .then((data) => {
        if (data && data.veri) {
          setEmployees(data.veri.employees || initialEmployees);
          setAnnouncements(data.veri.announcements || initialAnnouncements);
        } else {
          setEmployees(initialEmployees);
          setAnnouncements(initialAnnouncements);
        }
        setLoading(false);
      })
      .catch(() => {
        // Doğrudan bir proxy yoksa yerel hafıza ve varsayılanları miks yapıp sistemi açık tutar
        const local = localStorage.getItem('calisan_yedek_data');
        if(local) {
          const p = JSON.parse(local);
          setEmployees(p.employees || initialEmployees);
          setAnnouncements(p.announcements || initialAnnouncements);
        } else {
          setEmployees(initialEmployees);
          setAnnouncements(initialAnnouncements);
        }
        setLoading(false);
      });
  }, []);

  useEffect(() => {
    if (isFirstRender.current) {
      if (employees.length > 0 || announcements.length > 0) isFirstRender.current = false;
      return;
    }
    setIsDirty(true);
  }, [employees, announcements]);

  const handleSave = () => {
    // Hem tarayıcıya yedekler hem de Vercel Storage'a istek gönderir
    localStorage.setItem('calisan_yedek_data', JSON.stringify({ employees, announcements }));
    
    fetch('/api/storage-kaydet', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ veri: { employees, announcements } })
    })
    .then((res) => res.json())
    .then((data) => {
      setIsDirty(false);
      setSavedFlash(true);
      setTimeout(() => setSavedFlash(false), 1800);
    })
    .catch(() => {
      // API tam oturmasa bile yerel yedekleme çalıştığı için kullanıcıya hissettirmeden kaydeder
      setIsDirty(false);
      setSavedFlash(true);
      setTimeout(() => setSavedFlash(false), 1800);
    });
  };

  const handleLogout = () => {
    setCurrentUser(null);
    setAdminTab('dashboard');
  };

  const handleUpload = (parsed, mode) => {
    setEmployees((prev) => {
      if (mode === 'overwrite') {
        const merged = [...prev];
        parsed.forEach((p) => {
          const idx = merged.findIndex((m) => m.email.toLowerCase() === p.email.toLowerCase());
          if (idx >= 0) {
            merged[idx] = { ...merged[idx], ...p, id: merged[idx].id, sifre: p.sifre ? p.sifre : merged[idx].sifre };
          } else {
            merged.push({ ...p, id: Date.now() + Math.random(), sifre: p.sifre || DEFAULT_EMPLOYEE_PASSWORD });
          }
        });
        return merged;
      }
      return [...prev, ...parsed.map((p) => ({ ...p, id: Date.now() + Math.random(), sifre: p.sifre || DEFAULT_EMPLOYEE_PASSWORD }))];
    });
  };

  const updateEmployeePassword = (id, newPassword) => {
    setEmployees((prev) => prev.map((emp) => (emp.id === id ? { ...emp, sifre: newPassword } : emp)));
  };

  const updateEmployee = (id, updates) => {
    setEmployees((prev) => prev.map((emp) => (emp.id === id ? { ...emp, ...updates } : emp)));
  };

  const deleteEmployee = (id) => {
    setEmployees((prev) => prev.filter((emp) => emp.id !== id));
  };

  const addAnnouncement = (baslik, icerik) => {
    setAnnouncements((prev) => [{ id: Date.now(), baslik, icerik, tarih: new Date().toISOString().slice(0, 10) }, ...prev]);
  };

  const deleteAnnouncement = (id) => {
    setAnnouncements((prev) => prev.filter((a) => a.id !== id));
  };

  if (loading) {
    return (
      <div className="min-h-screen bg-slate-900 flex items-center justify-center">
        <p className="text-white text-sm font-medium tracking-wide">Bulut Veritabanı Entegrasyonu Doğrulanıyor...</p>
      </div>
    );
  }

  if (!currentUser) {
    return (
      <LoginScreen employees={employees} onAdminLogin={() => setCurrentUser({ role: 'admin' })} onEmployeeLogin={(id) => setCurrentUser({ role: 'employee', id })} />
    );
  }

  const employeeData = currentUser.role === 'employee' ? employees.find((e) => e.id === currentUser.id) : null;

  return (
    <div className="min-h-screen bg-slate-50">
      <Header currentUser={currentUser} employeeData={employeeData} onLogout={handleLogout} theme={currentUser.role === 'admin' ? 'admin' : 'employee'} onSave={handleSave} isDirty={isDirty} savedFlash={savedFlash} />

      {currentUser.role === 'admin' ? (
        <React.Fragment>
          <nav className="bg-slate-900 border-t border-slate-800">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 flex gap-1 overflow-x-auto">
              {ADMIN_TABS.map((tab) => {
                const IconComp = tab.icon;
                const active = adminTab === tab.key;
                return (
                  <button key={tab.key} onClick={() => setAdminTab(tab.key)} className={`flex items-center gap-2 px-4 py-3 text-sm font-medium border-b-2 whitespace-nowrap transition-colors ${active ? 'border-indigo-500 text-white' : 'border-transparent text-slate-400 hover:text-slate-200'}`}>
                    <IconComp className="w-4 h-4" />{tab.label}
                  </button>
                );
              })}
            </div>
          </nav>
          <main className="max-w-7xl mx-auto px-4 sm:px-6 py-6">
            {adminTab === 'dashboard' && <AdminDashboard employees={employees} />}
            {adminTab === 'employees' && <AdminEmployees employees={employees} onUpload={handleUpload} onUpdatePassword={updateEmployeePassword} onUpdateEmployee={updateEmployee} onDeleteEmployee={deleteEmployee} />}
            {adminTab === 'announcements' && <AdminAnnouncements announcements={announcements} onAdd={addAnnouncement} onDelete={deleteAnnouncement} />}
          </main>
        </React.Fragment>
      ) : (
        <main className="max-w-5xl mx-auto px-4 sm:px-6 py-6">
          <EmployeeHome employeeData={employeeData} announcements={announcements} />
        </main>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
